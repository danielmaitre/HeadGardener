{% extends "garden/base.html" %}
{% block title %}Delete step — HeadGardener{% endblock %}

{% block content %}
<h1 class="h4 mb-3">Delete step</h1>
<div class="alert alert-danger">
  <p class="mb-0">Are you sure you want to delete the <strong>{{ object.get_step_type_display }}</strong> step ({{ object.start_date }}) from <strong>{{ object.journey }}</strong>?</p>
</div>
<form method="post">
  {% csrf_token %}
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'journey-detail' object.journey.pk %}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
