{% if tasks %}
<h3 class="h6 text-muted text-uppercase mb-2">{{ title }}</h3>
<div class="list-group mb-3">
  {% for task in tasks %}
  <div class="list-group-item {% if is_done %}opacity-50{% endif %}">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <span class="badge me-2" style="background:{{ task.plant.category.color }};">{{ task.plant.category }}</span>
        <a href="{% url 'plant-detail' task.plant.pk %}" class="fw-semibold text-decoration-none {% if is_done %}text-decoration-line-through text-muted{% endif %}">{{ task.plant.name }}</a>
        <span class="ms-2 {% if is_done %}text-muted{% endif %}">{{ task.task }}</span>
        {% if task.notes %}<p class="mb-0 mt-1 small text-muted">{{ task.notes }}</p>{% endif %}
      </div>
      <form method="post" action="{% url 'annual-task-toggle' task.pk %}" class="ms-3 flex-shrink-0">
        {% csrf_token %}
        <input type="hidden" name="year" value="{{ year }}">
        <input type="hidden" name="start_period" value="{{ start_period }}">
        {% if is_done %}
        <button type="submit" class="btn btn-sm btn-outline-secondary">
          <i class="fa-solid fa-rotate-left me-1"></i>Mark as pending
        </button>
        {% else %}
        <button type="submit" class="btn btn-sm btn-success">
          <i class="fa-solid fa-check me-1"></i>Mark as done
        </button>
        {% endif %}
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
