{% extends "garden/base.html" %}
{% block title %}Delete task — HeadGardener{% endblock %}

{% block content %}
<h1 class="h4 mb-3">Delete annual task</h1>
<div class="alert alert-danger">
  <p class="mb-0">Delete <strong>{{ object }}</strong> for <strong>{{ object.plant.name }}</strong>?</p>
</div>
<form method="post">
  {% csrf_token %}
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'plant-detail' object.plant.pk %}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
