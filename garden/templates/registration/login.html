<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — HeadGardener</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-sm" style="width: 360px;">
      <div class="card-body p-4">
        <h1 class="h4 mb-4 text-center">🌱 HeadGardener</h1>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
            <div class="alert alert-danger py-2 small">Invalid username or password.</div>
          {% endif %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" id="id_password" class="form-control">
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-success w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
